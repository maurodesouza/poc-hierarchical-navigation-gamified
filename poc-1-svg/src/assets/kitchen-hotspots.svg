<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- This file contains invisible hotspots for the kitchen scene -->
  <!-- Hotspots are positioned over the refrigerator and other interactive areas -->
  
  <defs>
    <style>
      .hotspot {
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .hotspot:hover {
        filter: drop-shadow(0 0 8px rgba(66, 153, 225, 0.8));
      }
      .hotspot-rect {
        fill: transparent;
        stroke: transparent;
        stroke-width: 2;
        transition: all 0.3s ease;
      }
      .hotspot:hover .hotspot-rect {
        stroke: #4299e1;
        stroke-opacity: 0.8;
        fill: rgba(66, 153, 225, 0.1);
      }
      .hotspot-indicator {
        transition: all 0.3s ease;
      }
      .hotspot:hover .hotspot-indicator {
        fill: rgba(66, 153, 225, 0.3);
        stroke-opacity: 1;
        r: 10;
      }
    </style>
  </defs>

  <!-- Refrigerator hotspot (main interactive object) -->
  <!-- Positioned approximately over the fridge in the kitchen illustration -->
  <g class="hotspot" data-object-id="refrigerator">
    <rect 
      x="460" 
      y="280" 
      width="120" 
      height="180" 
      class="hotspot-rect"
      rx="4"
    />
    <!-- Add a subtle indicator that this is an object hotspot -->
    <circle 
      cx="520" 
      cy="370" 
      r="8" 
      fill="transparent" 
      stroke="#4299e1" 
      stroke-width="2" 
      opacity="0.5"
      class="hotspot-indicator"
    />
  </g>
</svg>