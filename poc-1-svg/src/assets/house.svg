<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="floorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d69e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b7791f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kitchenFloorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a0aec0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#718096;stop-opacity:1" />
    </linearGradient>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f7fafc" />

  <!-- Isometric house cutaway -->
  <g transform="translate(400, 300)">
    <!-- Main room floor -->
    <polygon points="-200,100 0,200 200,100 0,0" fill="url(#floorGradient)" stroke="#975a16" stroke-width="2" />
    
    <!-- Main room walls (back walls) -->
    <!-- Left wall -->
    <polygon points="-200,100 -200,-100 0,-200 0,0" fill="url(#wallGradient)" stroke="#a0aec0" stroke-width="2" />
    <!-- Right wall -->
    <polygon points="0,0 0,-200 200,-100 200,100" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="2" />
    
    <!-- Kitchen area (separate room) -->
    <g transform="translate(120, 50)">
      <!-- Kitchen floor -->
      <polygon points="-80,40 0,80 80,40 0,0" fill="url(#kitchenFloorGradient)" stroke="#4a5568" stroke-width="2" />
      
      <!-- Kitchen walls -->
      <polygon points="-80,40 -80,-60 0,-100 0,0" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="2" />
      <polygon points="0,0 0,-100 80,-60 80,40" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2" />
      
      <!-- Counter -->
      <polygon points="-60,20 -40,10 -40,-30 -60,-20" fill="#4a5568" stroke="#2d3748" stroke-width="1" />
      <polygon points="-40,10 20,40 20,0 -40,-30" fill="#2d3748" stroke="#1a202c" stroke-width="1" />
      <polygon points="-60,-20 -40,-30 20,0 -20,10" fill="#718096" stroke="#4a5568" stroke-width="1" />
      
      <!-- Stove hint -->
      <rect x="-30" y="-5" width="15" height="10" fill="#1a202c" stroke="#000" stroke-width="1" rx="1" />
      
      <!-- Cabinets hint -->
      <rect x="-55" y="-15" width="10" height="15" fill="#4a5568" stroke="#2d3748" stroke-width="1" />
    </g>
    
    <!-- Living room area -->
    <g transform="translate(-100, 50)">
      <!-- Sofa hint -->
      <polygon points="-40,20 -20,30 20,10 0,0" fill="#2c5282" stroke="#1a365d" stroke-width="1" />
      <polygon points="-20,30 20,10 20,0 -20,20" fill="#1a365d" stroke="#1a365d" stroke-width="1" />
      
      <!-- Coffee table hint -->
      <polygon points="-10,5 10,15 30,5 10,-5" fill="#975a16" stroke="#744210" stroke-width="1" />
    </g>
    
    <!-- Door frame to kitchen -->
    <polygon points="80,20 100,10 100,-30 80,-20" fill="#1a202c" stroke="#000" stroke-width="1" />
    
    <!-- Window on left wall -->
    <rect x="-180" y="-80" width="40" height="50" fill="#bee3f8" stroke="#4299e1" stroke-width="2" filter="url(#innerGlow)" opacity="0.7" />
    <line x1="-160" y1="-80" x2="-160" y2="-30" stroke="#4299e1" stroke-width="1" />
    <line x1="-180" y1="-55" x2="-140" y2="-55" stroke="#4299e1" stroke-width="1" />
    
    <!-- Window on right wall -->
    <rect x="100" y="-80" width="40" height="50" fill="#bee3f8" stroke="#4299e1" stroke-width="2" filter="url(#innerGlow)" opacity="0.7" />
    <line x1="120" y1="-80" x2="120" y2="-30" stroke="#4299e1" stroke-width="1" />
    <line x1="100" y1="-55" x2="140" y2="-55" stroke="#4299e1" stroke-width="1" />
  </g>

  <!-- Ceiling line -->
  <line x1="200" y1="100" x2="600" y2="100" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="5,5" />
</svg>