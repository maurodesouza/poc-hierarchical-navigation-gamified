<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2f25;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="houseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roofGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c53030;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="600" fill="url(#skyGradient)" />

  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="#ffffff" opacity="0.8" />
  <circle cx="200" cy="120" r="1.5" fill="#ffffff" opacity="0.6" />
  <circle cx="350" cy="60" r="2" fill="#ffffff" opacity="0.7" />
  <circle cx="500" cy="100" r="1.5" fill="#ffffff" opacity="0.5" />
  <circle cx="650" cy="70" r="2" fill="#ffffff" opacity="0.8" />
  <circle cx="750" cy="130" r="1.5" fill="#ffffff" opacity="0.6" />
  <circle cx="150" cy="180" r="1" fill="#ffffff" opacity="0.4" />
  <circle cx="600" cy="160" r="1" fill="#ffffff" opacity="0.5" />

  <!-- Moon -->
  <circle cx="700" cy="80" r="30" fill="#f7fafc" opacity="0.9" filter="url(#glow)" />

  <!-- Isometric ground plane -->
  <polygon points="400,450 200,550 400,650 600,550" fill="url(#groundGradient)" stroke="#1a2f25" stroke-width="2" />

  <!-- Isometric house -->
  <g transform="translate(400, 380)">
    <!-- House base (isometric cube) -->
    <!-- Front face -->
    <polygon points="-60,0 60,0 60,80 -60,80" fill="#4a5568" stroke="#2d3748" stroke-width="2" />
    <!-- Right face -->
    <polygon points="60,0 100,-20 100,60 60,80" fill="#2d3748" stroke="#1a202c" stroke-width="2" />
    <!-- Top face -->
    <polygon points="-60,0 -20,-20 100,-20 60,0" fill="#718096" stroke="#4a5568" stroke-width="2" />
    
    <!-- Roof (isometric prism) -->
    <!-- Left roof face -->
    <polygon points="-60,0 -20,-20 -20,-60 -60,-40" fill="url(#roofGradient)" stroke="#9b2c2c" stroke-width="2" />
    <!-- Right roof face -->
    <polygon points="-20,-20 100,-20 100,-60 -20,-60" fill="#c53030" stroke="#9b2c2c" stroke-width="2" />
    <!-- Front roof face -->
    <polygon points="-60,-40 -20,-60 60,-40 0,-20" fill="#e53e3e" stroke="#c53030" stroke-width="2" />
    
    <!-- Door -->
    <rect x="-20" y="30" width="30" height="50" fill="#1a202c" stroke="#000" stroke-width="1" rx="2" />
    <circle cx="-5" cy="55" r="3" fill="#ffd700" />
    
    <!-- Windows with glow -->
    <rect x="-50" y="20" width="20" height="25" fill="#4299e1" stroke="#2b6cb0" stroke-width="2" filter="url(#glow)" opacity="0.8" />
    <rect x="20" y="20" width="20" height="25" fill="#4299e1" stroke="#2b6cb0" stroke-width="2" filter="url(#glow)" opacity="0.8" />
    
    <!-- Window frames -->
    <line x1="-40" y1="20" x2="-40" y2="45" stroke="#2b6cb0" stroke-width="1" />
    <line x1="-50" y1="32.5" x2="-30" y2="32.5" stroke="#2b6cb0" stroke-width="1" />
    <line x1="30" y1="20" x2="30" y2="45" stroke="#2b6cb0" stroke-width="1" />
    <line x1="20" y1="32.5" x2="40" y2="32.5" stroke="#2b6cb0" stroke-width="1" />
  </g>

  <!-- Decorative elements -->
  <!-- Small bush -->
  <ellipse cx="280" cy="520" rx="20" ry="15" fill="#2d4a3e" stroke="#1a2f25" stroke-width="1" />
  <ellipse cx="270" cy="515" rx="15" ry="12" fill="#3d5a4e" stroke="#2d4a3e" stroke-width="1" />
  
  <!-- Another bush -->
  <ellipse cx="520" cy="530" rx="18" ry="12" fill="#2d4a3e" stroke="#1a2f25" stroke-width="1" />
  <ellipse cx="530" cy="525" rx="14" ry="10" fill="#3d5a4e" stroke="#2d4a3e" stroke-width="1" />
  
  <!-- Path to house -->
  <polygon points="400,450 380,480 420,480 400,510" fill="#4a5568" stroke="#2d3748" stroke-width="1" />
</svg>