<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kitchenWallGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kitchenFloorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a0aec0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#718096;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="counterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fridgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fridgeDoorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f7fafc" />

  <!-- Isometric kitchen room -->
  <g transform="translate(400, 280)">
    <!-- Floor -->
    <polygon points="-250,150 0,300 250,150 0,0" fill="url(#kitchenFloorGradient)" stroke="#4a5568" stroke-width="2" />
    
    <!-- Back wall -->
    <polygon points="-250,150 -250,-150 0,-300 0,0" fill="url(#kitchenWallGradient)" stroke="#cbd5e0" stroke-width="2" />
    <!-- Right wall -->
    <polygon points="0,0 0,-300 250,-150 250,150" fill="#edf2f7" stroke="#e2e8f0" stroke-width="2" />
    
    <!-- Counter along back wall -->
    <g transform="translate(-150, 50)">
      <!-- Counter top -->
      <polygon points="-80,40 0,80 80,40 0,0" fill="#718096" stroke="#4a5568" stroke-width="2" />
      <!-- Counter front -->
      <polygon points="-80,40 -80,100 0,140 0,80" fill="#4a5568" stroke="#2d3748" stroke-width="2" />
      <polygon points="0,80 0,140 80,100 80,40" fill="#2d3748" stroke="#1a202c" stroke-width="2" />
      
      <!-- Stove -->
      <g transform="translate(-30, 20)">
        <rect x="-15" y="-10" width="30" height="20" fill="#1a202c" stroke="#000" stroke-width="1" rx="2" />
        <circle cx="-8" cy="0" r="4" fill="#2d3748" stroke="#1a202c" stroke-width="1" />
        <circle cx="8" cy="0" r="4" fill="#2d3748" stroke="#1a202c" stroke-width="1" />
      </g>
      
      <!-- Sink -->
      <g transform="translate(30, 30)">
        <rect x="-12" y="-8" width="24" height="16" fill="#4299e1" stroke="#2b6cb0" stroke-width="1" rx="2" />
        <ellipse cx="0" cy="0" rx="8" ry="4" fill="#bee3f8" stroke="#4299e1" stroke-width="1" />
      </g>
    </g>
    
    <!-- Upper cabinets on back wall -->
    <g transform="translate(-150, -80)">
      <polygon points="-60,30 0,60 60,30 0,0" fill="#4a5568" stroke="#2d3748" stroke-width="2" />
      <polygon points="-60,30 -60,50 0,80 0,60" fill="#2d3748" stroke="#1a202c" stroke-width="2" />
      <polygon points="0,60 0,80 60,50 60,30" fill="#1a202c" stroke="#1a202c" stroke-width="2" />
      
      <!-- Cabinet doors -->
      <line x1="0" y1="30" x2="0" y2="80" stroke="#1a202c" stroke-width="1" />
      <circle cx="-30" cy="55" r="2" fill="#718096" />
      <circle cx="30" cy="55" r="2" fill="#718096" />
    </g>
    
    <!-- Refrigerator (main object) -->
    <g transform="translate(100, 50)" filter="url(#shadow)">
      <!-- Fridge body -->
      <polygon points="-40,60 0,80 40,60 0,40" fill="url(#fridgeGradient)" stroke="#a0aec0" stroke-width="2" />
      <!-- Fridge front -->
      <polygon points="-40,60 -40,-60 0,-80 0,40" fill="url(#fridgeDoorGradient)" stroke="#cbd5e0" stroke-width="2" />
      <polygon points="0,40 0,-80 40,-60 40,60" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="2" />
      
      <!-- Fridge door handle -->
      <rect x="-35" y="-40" width="4" height="30" fill="#718096" stroke="#4a5568" stroke-width="1" rx="1" />
      <rect x="31" y="-40" width="4" height="30" fill="#718096" stroke="#4a5568" stroke-width="1" rx="1" />
      
      <!-- Door divider -->
      <line x1="-40" y1="-10" x2="0" y2="-30" stroke="#a0aec0" stroke-width="2" />
      <line x1="0" y1="-30" x2="40" y2="-10" stroke="#cbd5e0" stroke-width="2" />
      
      <!-- Fridge brand logo area -->
      <rect x="-20" y="-55" width="40" height="15" fill="#4299e1" stroke="#2b6cb0" stroke-width="1" rx="2" opacity="0.3" />
      
      <!-- Water/ice dispenser hint -->
      <rect x="5" y="-20" width="10" height="20" fill="#1a202c" stroke="#000" stroke-width="1" rx="1" />
    </g>
    
    <!-- Lower cabinets on right wall -->
    <g transform="translate(150, 50)">
      <polygon points="-30,20 0,40 30,20 0,0" fill="#4a5568" stroke="#2d3748" stroke-width="2" />
      <polygon points="-30,20 -30,60 0,80 0,40" fill="#2d3748" stroke="#1a202c" stroke-width="2" />
      <polygon points="0,40 0,80 30,60 30,20" fill="#1a202c" stroke="#1a202c" stroke-width="2" />
      
      <!-- Cabinet door -->
      <circle cx="0" cy="50" r="2" fill="#718096" />
    </g>
    
    <!-- Window on back wall -->
    <g transform="translate(-100, -100)">
      <rect x="-30" y="-40" width="60" height="80" fill="#bee3f8" stroke="#4299e1" stroke-width="3" filter="url(#glow)" opacity="0.6" />
      <line x1="0" y1="-40" x2="0" y2="40" stroke="#4299e1" stroke-width="2" />
      <line x1="-30" y1="0" x2="30" y2="0" stroke="#4299e1" stroke-width="2" />
    </g>
    
    <!-- Ceiling light -->
    <g transform="translate(0, -250)">
      <polygon points="-20,10 0,20 20,10 0,0" fill="#ffd700" stroke="#d69e2e" stroke-width="2" filter="url(#glow)" />
      <line x1="0" y1="0" x2="0" y2="-30" stroke="#4a5568" stroke-width="2" />
    </g>
  </g>
</svg>