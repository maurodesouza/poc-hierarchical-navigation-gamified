<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect width="800" height="600" fill="#87CEEB"/>
  
  <!-- Ground -->
  <rect x="0" y="400" width="800" height="200" fill="#90EE90"/>
  
  <!-- House isometric view -->
  <g transform="translate(300, 200)">
    <!-- House base -->
    <polygon points="100,100 200,150 200,250 100,200" fill="#8B4513" stroke="#5D3A1A" stroke-width="3"/>
    <polygon points="200,150 300,100 300,200 200,250" fill="#A0522D" stroke="#5D3A1A" stroke-width="3"/>
    <polygon points="100,200 200,250 300,200 200,150" fill="#D2691E" stroke="#5D3A1A" stroke-width="3"/>
    
    <!-- Roof -->
    <polygon points="100,100 200,50 300,100 200,150" fill="#B22222" stroke="#8B0000" stroke-width="2"/>
    
    <!-- Door -->
    <rect x="180" y="180" width="40" height="70" fill="#654321" stroke="#3D2914" stroke-width="2"/>
    
    <!-- Windows -->
    <rect x="120" y="130" width="50" height="50" fill="#87CEEB" stroke="#5D3A1A" stroke-width="2"/>
    <rect x="230" y="130" width="50" height="50" fill="#87CEEB" stroke="#5D3A1A" stroke-width="2"/>
  </g>
  
  <!-- Clickable hotspot for house -->
  <rect x="300" y="200" width="200" height="150" fill="transparent" stroke="transparent" stroke-width="0"/>
</svg>