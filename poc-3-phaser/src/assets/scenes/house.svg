<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Room background -->
  <rect width="800" height="600" fill="#F5F5DC"/>
  
  <!-- Floor -->
  <rect x="50" y="300" width="700" height="250" fill="#DEB887" stroke="#CD853F" stroke-width="2"/>
  
  <!-- Kitchen area isometric view -->
  <g transform="translate(250, 150)">
    <!-- Kitchen base -->
    <polygon points="50,50 250,100 250,200 50,150" fill="#E8E8E8" stroke="#999" stroke-width="3"/>
    <polygon points="250,100 450,50 450,150 250,200" fill="#D3D3D3" stroke="#999" stroke-width="3"/>
    <polygon points="50,150 250,200 450,150 250,100" fill="#F5F5F5" stroke="#999" stroke-width="3"/>
    
    <!-- Counter -->
    <rect x="100" y="120" width="150" height="80" fill="#D2B48C" stroke="#8B4513" stroke-width="2"/>
    
    <!-- Stove -->
    <rect x="300" y="80" width="100" height="80" fill="#C0C0C0" stroke="#808080" stroke-width="2"/>
    
    <!-- Table -->
    <rect x="150" y="180" width="100" height="60" fill="#F5F5F5" stroke="#CCC" stroke-width="2"/>
  </g>
  
  <!-- Clickable hotspot for kitchen -->
  <rect x="250" y="150" width="300" height="250" fill="transparent" stroke="transparent" stroke-width="0"/>
</svg>