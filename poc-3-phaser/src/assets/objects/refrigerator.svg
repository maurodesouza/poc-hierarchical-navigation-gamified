<svg width="120" height="180" viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Main body -->
  <rect x="0" y="0" width="120" height="180" fill="#E8E8E8" stroke="#A9A9A9" stroke-width="3" rx="5"/>
  
  <!-- Freezer section -->
  <rect x="5" y="5" width="110" height="70" fill="#F0F0F0" stroke="#A9A9A9" stroke-width="2" rx="3"/>
  
  <!-- Fridge section -->
  <rect x="5" y="80" width="110" height="95" fill="#F0F0F0" stroke="#A9A9A9" stroke-width="2" rx="3"/>
  
  <!-- Handles -->
  <rect x="100" y="30" width="10" height="20" fill="#A9A9A9" stroke="#808080" stroke-width="1" rx="2"/>
  <rect x="100" y="120" width="10" height="25" fill="#A9A9A9" stroke="#808080" stroke-width="1" rx="2"/>
  
  <!-- Brand label -->
  <text x="60" y="40" text-anchor="middle" font-size="10" fill="#666" font-weight="bold">COLD</text>
  
  <!-- Hover effect indicator -->
  <rect x="0" y="0" width="120" height="180" fill="transparent" stroke="#4a90e2" stroke-width="0" rx="5" class="hover-border"/>
</svg>